# =============================================================
# 3단계: CD 체험 - "Docker 이미지가 자동으로 빌드된다"
# =============================================================
# 체험 포인트:
#   - 2단계(린트+테스트) 통과해야만 Docker 빌드 진행
#   - 실제 배포 파이프라인의 축소판을 체험
#   - needs 키워드로 Job 간 의존성 설정
# =============================================================

name: "Step 3 - Docker Build"

on:
  push:
    branches: [main]

jobs:
  # 먼저 2단계와 동일한 검증을 통과해야 한다
  lint-and-test:
    name: 🔍 린트 + ✅ 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 린트 검사
        run: ruff check app/ tests/

      - name: 테스트 실행
        run: pytest tests/ -v

  # 검증 통과 후 Docker 이미지 빌드
  docker-build:
    name: 🐳 Docker 이미지 빌드
    runs-on: ubuntu-latest
    needs: lint-and-test    # lint-and-test 성공해야만 실행

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Docker 이미지 빌드
        run: docker build -t hello-devops:latest .

      - name: 빌드된 이미지 확인
        run: docker images hello-devops

      - name: 컨테이너 실행 테스트
        run: |
          docker run -d --name test-container -p 8000:8000 hello-devops:latest
          sleep 3
          curl -f http://localhost:8000/health
          docker stop test-container
